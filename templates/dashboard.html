<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>ForexAI v2</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;600;700&family=Syne:wght@400;700;800&display=swap" rel="stylesheet">
<style>
:root{--bg:#05080c;--sur:#0b1018;--bdr:#18202e;--mut:#374d68;--txt:#bcc8d8;--hd:#e2eaf4;--buy:#3dd68c;--sell:#f75d5d;--flat:#58a6ff;--gold:#e8b84b;--lim:#c084fc;--dim:#6a87a8;--mono:'JetBrains Mono',monospace;--sans:'Syne',sans-serif}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--txt);font-family:var(--mono);font-size:12px;line-height:1.6}
body::before{content:'';position:fixed;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,.07) 2px,rgba(0,0,0,.07) 4px);pointer-events:none;z-index:9999}
header{border-bottom:1px solid var(--bdr);padding:15px 22px;display:flex;align-items:center;justify-content:space-between;background:var(--sur);position:sticky;top:0;z-index:100}
.logo{font-family:var(--sans);font-size:16px;font-weight:800;color:var(--hd)}
.logo span{color:var(--gold)}.logo sub{font-size:9px;color:var(--mut);margin-left:4px}
.dot{width:6px;height:6px;border-radius:50%;background:var(--buy);display:inline-block;margin-right:6px;animation:pulse 2s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.2}}
#clock{font-size:10px;color:var(--mut);letter-spacing:1px}
.sbar{display:flex;gap:1px;background:var(--bdr);border-bottom:1px solid var(--bdr)}
.sc{flex:1;padding:11px 16px;background:var(--sur)}
.sl{font-size:9px;color:var(--mut);text-transform:uppercase;letter-spacing:1.5px;margin-bottom:3px}
.sv{font-size:18px;font-weight:700;font-family:var(--sans);color:var(--hd)}
.sv.buy{color:var(--buy)}.sv.gold{color:var(--gold)}.sv.lim{color:var(--lim)}
.main{padding:18px 22px;max-width:1300px;margin:0 auto}
.stitle{font-size:9px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--mut);margin-bottom:10px;padding-bottom:5px;border-bottom:1px solid var(--bdr)}
#feed{display:flex;flex-direction:column;gap:7px}
.card{background:var(--sur);border:1px solid var(--bdr);border-radius:5px;padding:13px 16px;animation:fi .3s ease;border-left:3px solid var(--bdr)}
@keyframes fi{from{opacity:0;transform:translateY(-3px)}to{opacity:1;transform:translateY(0)}}
.card.mbuy{border-left-color:var(--buy)}.card.msell{border-left-color:var(--sell)}
.card.lbuy{border-left-color:var(--lim)}.card.lsell{border-left-color:#a855f7}
.r1{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:7px}
.sym{font-family:var(--sans);font-weight:800;font-size:13px;color:var(--hd)}
.type-tag{font-size:9px;padding:1px 6px;border-radius:2px;letter-spacing:.8px;border:1px solid}
.type-m{color:var(--gold);border-color:rgba(232,184,75,.3);background:rgba(232,184,75,.08)}
.type-l{color:var(--lim);border-color:rgba(192,132,252,.3);background:rgba(192,132,252,.08)}
.badge{display:inline-block;padding:2px 8px;border-radius:3px;font-size:10px;font-weight:700;letter-spacing:.8px}
.bBUY{background:rgba(61,214,140,.1);color:var(--buy);border:1px solid rgba(61,214,140,.25)}
.bSELL{background:rgba(247,93,93,.1);color:var(--sell);border:1px solid rgba(247,93,93,.25)}
.bFLAT{background:rgba(88,166,255,.07);color:var(--flat);border:1px solid rgba(88,166,255,.2)}
.bias{font-size:9px;padding:1px 6px;border-radius:2px}
.biasBULL{background:rgba(61,214,140,.07);color:var(--buy)}
.biasBEAR{background:rgba(247,93,93,.07);color:var(--sell)}
.biasRANG{background:rgba(88,166,255,.07);color:var(--flat)}
.cw{display:flex;align-items:center;gap:5px;margin-left:auto}
.cb{width:50px;height:3px;background:var(--bdr);border-radius:2px;overflow:hidden}
.cf{height:100%;background:var(--gold);border-radius:2px}
.cn{font-size:10px;color:var(--dim)}
.r2{display:grid;grid-template-columns:repeat(4,auto);gap:14px;margin-bottom:7px}
.pc{display:flex;flex-direction:column;gap:1px}
.pl{font-size:9px;color:var(--mut);letter-spacing:.8px}
.pv{font-size:11px;color:var(--txt)}
.r3{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:7px}
.tag{font-size:9px;color:var(--mut);background:rgba(255,255,255,.02);border:1px solid var(--bdr);border-radius:3px;padding:2px 6px}
.tag span{color:var(--dim)}
.reason{font-size:10px;color:var(--mut);line-height:1.5;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;margin-bottom:5px}
.ts{font-size:9px;color:var(--bdr)}
.empty{text-align:center;padding:60px;color:var(--mut)}
#loading{text-align:center;padding:60px;color:var(--mut);letter-spacing:1px}
@media(max-width:640px){.sbar{flex-wrap:wrap}.sc{flex:1 1 45%}.r2{grid-template-columns:repeat(2,auto)}}
</style>
</head>
<body>
<header>
  <div class="logo">Forex<span>AI</span><sub>v2</sub></div>
  <div><span class="dot"></span><span id="clock"></span></div>
</header>
<div class="sbar">
  <div class="sc"><div class="sl">Signals</div><div class="sv" id="s0">--</div></div>
  <div class="sc"><div class="sl">Momentum</div><div class="sv buy" id="s1">--</div></div>
  <div class="sc"><div class="sl">Limit Orders</div><div class="sv lim" id="s2">--</div></div>
  <div class="sc"><div class="sl">Avg Confidence</div><div class="sv gold" id="s3">--</div></div>
  <div class="sc"><div class="sl">Last Signal</div><div class="sv" id="s4" style="font-size:12px">--</div></div>
</div>
<div class="main">
  <div class="stitle">Signal Feed -- refreshes every 30s</div>
  <div id="loading">Connecting to ForexAI...</div>
  <div id="feed"></div>
</div>
<script>
const p5=n=>n?parseFloat(n).toFixed(5):'--';
const rel=iso=>{const s=Math.floor((Date.now()-new Date(iso))/1000);return s<60?s+'s ago':s<3600?Math.floor(s/60)+'m ago':s<86400?Math.floor(s/3600)+'h ago':Math.floor(s/86400)+'d ago'};
const fmt=iso=>iso?new Date(iso).toLocaleString('en-GB',{day:'2-digit',month:'short',hour:'2-digit',minute:'2-digit'}):'--';
function activeCard(r){
  const a=r.active_signal||{};const dir=a.direction||'FLAT';
  const cls=a.trade?(dir==='BUY'?'mbuy':'msell'):'';const conf=a.confidence||0;
  return `<div class="card ${cls}">
    <div class="r1"><span class="sym">${a.symbol||'NONE'}</span>
    <span class="type-tag type-m">MOMENTUM</span>
    <span class="badge b${dir}">${dir}</span>
    ${a.d1_bias?`<span class="bias bias${a.d1_bias.slice(0,4)}">${a.d1_bias}</span>`:''}
    ${a.h1_pattern&&a.h1_pattern!=='NONE'?`<span class="tag"><span>H1</span> ${a.h1_pattern}</span>`:''}
    <div class="cw"><div class="cb"><div class="cf" style="width:${conf}%"></div></div><span class="cn">${conf}%</span></div></div>
    ${a.trade?`<div class="r2">
      <div class="pc"><div class="pl">SL</div><div class="pv">${p5(a.sl)}</div></div>
      <div class="pc"><div class="pl">TP1 1.5R</div><div class="pv">${p5(a.tp1)}</div></div>
      <div class="pc"><div class="pl">TP2 3.0R</div><div class="pv">${p5(a.tp2)}</div></div>
      <div class="pc"><div class="pl">SL pips</div><div class="pv">${a.sl_pips||'--'}</div></div></div>`:''}
    ${a.trigger_condition?`<div class="r3">
      <span class="tag"><span>M15</span> ${a.trigger_condition}</span>
      ${a.watch_level?`<span class="tag"><span>watch</span> ${p5(a.watch_level)}</span>`:''}</div>`:''}
    ${a.h4_support||a.h4_resistance?`<div class="r3">
      ${a.h4_support?`<span class="tag"><span>H4 S</span> ${p5(a.h4_support)}</span>`:''}
      ${a.h4_resistance?`<span class="tag"><span>H4 R</span> ${p5(a.h4_resistance)}</span>`:''}</div>`:''}
    <div class="reason">${a.reasoning||''}</div>
    <div class="ts">${fmt(r.timestamp)}</div></div>`;
}
function limitCards(r){
  return (r.pending_orders||[]).map(o=>{
    const dir=o.type==='BUY_LIMIT'?'BUY':'SELL';
    return `<div class="card ${dir==='BUY'?'lbuy':'lsell'}">
      <div class="r1"><span class="sym">${o.symbol}</span>
      <span class="type-tag type-l">LIMIT ORDER</span>
      <span class="badge b${dir}">${o.type}</span></div>
      <div class="r2">
        <div class="pc"><div class="pl">ENTRY</div><div class="pv">${p5(o.entry)}</div></div>
        <div class="pc"><div class="pl">SL</div><div class="pv">${p5(o.sl)}</div></div>
        <div class="pc"><div class="pl">TP1</div><div class="pv">${p5(o.tp1)}</div></div>
        <div class="pc"><div class="pl">TP2</div><div class="pv">${p5(o.tp2)}</div></div></div>
      <div class="r3">
        <span class="tag"><span>SL</span> ${o.sl_pips}pips</span>
        <span class="tag"><span>expires</span> ${o.expiry_hours}h</span></div>
      <div class="reason">${o.reasoning||''}</div></div>`;
  }).join('');
}
function render(records){
  document.getElementById('loading').style.display='none';
  const feed=document.getElementById('feed');
  if(!records.length){feed.innerHTML='<div class="empty">No signals yet</div>';return;}
  let m=0,l=0,confs=[];
  records.forEach(r=>{if(r.active_signal?.trade)m++;l+=(r.pending_orders||[]).length;confs.push(r.active_signal?.confidence||0);});
  document.getElementById('s0').textContent=records.length;
  document.getElementById('s1').textContent=m;
  document.getElementById('s2').textContent=l;
  document.getElementById('s3').textContent=Math.round(confs.reduce((a,b)=>a+b,0)/confs.length)+'%';
  document.getElementById('s4').textContent=records[0]?.timestamp?rel(records[0].timestamp):'--';
  feed.innerHTML=records.map(r=>activeCard(r)+limitCards(r)).join('<div style="height:4px"></div>');
}
async function load(){
  try{const r=await fetch('/history');render(await r.json());}
  catch(e){document.getElementById('loading').textContent='Connection error -- is Flask running?';}
}
setInterval(()=>{document.getElementById('clock').textContent=new Date().toUTCString().replace('GMT','UTC');},1000);
load();setInterval(load,30000);
</script>
</body>
</html>
